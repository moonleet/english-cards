<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разговорные связки | English Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --card-bg: #ffffff;
            --accent: #2c5f2d;
            --accent-light: #97bc62;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --shadow: rgba(0,0,0,0.08);
            --shadow-hover: rgba(0,0,0,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#e8e4d9 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 24px; }
        .progress-container {
            background: #e8e4d9;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            max-width: 400px;
            margin: 0 auto 32px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
        }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 32px; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            perspective: 1000px;
        }
        .card-wrapper {
            position: relative;
            height: 200px;
            cursor: pointer;
            animation: fadeInUp 0.6s ease backwards;
        }
        .card-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .card-wrapper:nth-child(2) { animation-delay: 0.15s; }
        .card-wrapper:nth-child(3) { animation-delay: 0.2s; }
        .card-wrapper:nth-child(4) { animation-delay: 0.25s; }
        .card-wrapper:nth-child(5) { animation-delay: 0.3s; }
        .card-wrapper:nth-child(6) { animation-delay: 0.35s; }
        .card-wrapper:nth-child(7) { animation-delay: 0.4s; }
        .card-wrapper:nth-child(8) { animation-delay: 0.45s; }
        .card-wrapper:nth-child(9) { animation-delay: 0.5s; }
        .card-wrapper:nth-child(10) { animation-delay: 0.55s; }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--shadow);
        }
        .card-wrapper:hover .card { box-shadow: 0 12px 40px var(--shadow-hover); }
        .card-wrapper.flipped .card { transform: rotateY(180deg); }
        .card-wrapper.learned .card-front {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 2px solid var(--accent-light);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: var(--card-bg);
            border: 1px solid #e8e4d9;
        }
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--accent) 0%, #1b4d1c 100%);
            color: white;
            border: none;
        }
        .phrase-number {
            position: absolute;
            top: 16px;
            left: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .card-back .phrase-number { color: rgba(255,255,255,0.6); }
        .phrase-en {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            color: var(--accent);
        }
        .card-back .phrase-en { color: rgba(255,255,255,0.9); font-size: 1.1rem; margin-bottom: 12px; }
        .phrase-ru { font-size: 1.2rem; text-align: center; line-height: 1.4; font-weight: 400; }
        .hint {
            position: absolute;
            bottom: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .card-back .hint { color: rgba(255,255,255,0.5); }
        .check-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent-light);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .check-btn:hover { background: var(--accent-light); transform: scale(1.1); }
        .check-btn.checked { background: var(--accent); border-color: var(--accent); }
        .check-btn.checked::after { content: "✓"; color: white; font-weight: bold; font-size: 1rem; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #1e4a1f; transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow-hover); }
        .btn-secondary { background: white; color: var(--accent); border: 2px solid var(--accent); }
        .btn-secondary:hover { background: var(--accent); color: white; transform: translateY(-2px); }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mode-toggle { text-align: center; margin-bottom: 24px; }
        .mode-btn {
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .mode-btn.active { background: var(--accent); color: white; }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .card-wrapper { height: 180px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Разговорные связки</h1>
            <p class="subtitle">41–50 | Учим английские фразы интерактивно</p>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0 из 10 выучено</div>
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('all')">Все</button>
                <button class="mode-btn" onclick="setMode('unlearned')">Невыученные</button>
            </div>
        </header>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="controls">
            <button class="btn btn-secondary" onclick="flipAll()">Перевернуть все</button>
            <button class="btn btn-primary" onclick="resetProgress()">Начать заново</button>
        </div>
    </div>
    <script>
        const phrases = [
            { id: 41, en: "By the way", ru: "Кстати" },
            { id: 42, en: "As far as I know", ru: "Насколько я знаю" },
            { id: 43, en: "In my opinion", ru: "По моему мнению" },
            { id: 44, en: "To be honest", ru: "Честно говоря" },
            { id: 45, en: "Believe it or not", ru: "Хочешь верь, хочешь нет" },
            { id: 46, en: "On the one hand", ru: "С одной стороны" },
            { id: 47, en: "On the other hand", ru: "С другой стороны" },
            { id: 48, en: "All of a sudden", ru: "Вдруг, внезапно" },
            { id: 49, en: "Speaking of which", ru: "Кстати о..." },
            { id: 50, en: "To make a long story short", ru: "Короче говоря" }
        ];
        let learned = new Set();
        let currentMode = 'all';
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            phrases.forEach((phrase, index) => {
                if (currentMode === 'unlearned' && learned.has(phrase.id)) return;
                const wrapper = document.createElement('div');
                wrapper.className = `card-wrapper ${learned.has(phrase.id) ? 'learned' : ''}`;
                wrapper.dataset.id = phrase.id;
                wrapper.style.animationDelay = `${index * 0.05}s`;
                wrapper.innerHTML = `
                    <div class="card">
                        <div class="card-face card-front">
                            <span class="phrase-number">${phrase.id}</span>
                            <button class="check-btn ${learned.has(phrase.id) ? 'checked' : ''}" 
                                    onclick="toggleLearned(event, ${phrase.id})"></button>
                            <div class="phrase-en">${phrase.en}</div>
                            <span class="hint">Нажмите, чтобы перевернуть</span>
                        </div>
                        <div class="card-face card-back">
                            <span class="phrase-number">${phrase.id}</span>
                            <div class="phrase-en">${phrase.en}</div>
                            <div class="phrase-ru">${phrase.ru}</div>
                            <span class="hint">Нажмите, чтобы вернуть</span>
                        </div>
                    </div>
                `;
                wrapper.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('check-btn')) {
                        wrapper.classList.toggle('flipped');
                    }
                });
                grid.appendChild(wrapper);
            });
            updateProgress();
        }
        function toggleLearned(event, id) {
            event.stopPropagation();
            if (learned.has(id)) { learned.delete(id); } else { learned.add(id); }
            renderCards();
        }
        function updateProgress() {
            const percent = (learned.size / phrases.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${learned.size} из ${phrases.length} выучено`;
        }
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCards();
        }
        function flipAll() {
            document.querySelectorAll('.card-wrapper').forEach(wrapper => {
                wrapper.classList.toggle('flipped');
            });
        }
        function resetProgress() {
            learned.clear();
            currentMode = 'all';
            document.querySelectorAll('.mode-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === 0);
            });
            renderCards();
        }
        renderCards();
    </script>
</body>
</html>
