<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выражения времени в английском</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e3a8a); 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
            color: #fff;
        }
        h1 { 
            font-size: 2.2em; 
            font-weight: 800; 
            margin-bottom: 5px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #38bdf8, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1200px; 
        }
        
        /* Эффект матового стекла (Glassmorphism) */
        .card { 
            width: 100%; 
            height: 200px; 
            perspective: 1000px; 
            cursor: pointer; 
        }
        .card-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            text-align: center; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        .card.flipped .card-inner { 
            transform: rotateY(180deg); 
        }
        
        .card-front, .card-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 25px; 
            border-radius: 16px; 
            box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .card-front { 
            color: #38bdf8; 
            font-size: 1.5em; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .card-front::after {
            content: 'кликни, чтобы перевернуть';
            position: absolute;
            bottom: 15px;
            font-size: 0.55em;
            color: #64748b;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-back { 
            transform: rotateY(180deg); 
        }
        
        .translation { 
            font-size: 1.25em; 
            font-weight: 700; 
            margin-bottom: 12px; 
            color: #f1f5f9; 
            border-bottom: 1px dashed rgba(56, 189, 248, 0.4);
            padding-bottom: 5px;
            width: 100%;
        }
        .example { 
            font-style: italic; 
            font-size: 0.95em; 
            color: #cbd5e1;
            line-height: 1.4;
        }
        .example b {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <h1>Time Expressions ⏳</h1>
    <div class="subtitle">Нажми на карточку, чтобы узнать перевод и контекст</div>
    
    <div class="grid" id="grid"></div>

<script>
    const phrases = [
        { eng: "Used to", rus: "Делал раньше (теперь нет)", ex: "I <b>used to</b> smoke, but I quit two years ago." },
        { eng: "Be used to + ing", rus: "Привык к (чему-то)", ex: "I <b>am used to waking up</b> early every day." },
        { eng: "Going to", rus: "Собираюсь (сделать что-то)", ex: "We <b>are going to</b> watch a movie tonight." },
        { eng: "About to", rus: "Вот-вот сделаю", ex: "Hurry up! The train is <b>about to</b> leave." },
        { eng: "It takes me...", rus: "Мне нужно времени на...", ex: "<b>It takes me</b> 20 minutes <b>to</b> get to work." },
        { eng: "By the time", rus: "К тому времени как", ex: "<b>By the time</b> the police arrived, the thieves were gone." },
        { eng: "As soon as", rus: "Как только", ex: "I will call you <b>as soon as</b> I land." },
        { eng: "Not until", rus: "Только после того как", ex: "He did <b>not</b> leave <b>until</b> the work was done." },
        { eng: "Since", rus: "С тех пор как", ex: "I haven't seen him <b>since</b> we graduated." },
        { eng: "For + период", rus: "На протяжении (уже 3 года)", ex: "She has been living in Paris <b>for</b> 3 years." }
    ];

    const grid = document.getElementById('grid');

    phrases.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => card.classList.toggle('flipped');
        
        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">${item.eng}</div>
                <div class="card-back">
                    <div class="translation">${item.rus}</div>
                    <div class="example"><b>Пример:</b> ${item.ex}</div>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
